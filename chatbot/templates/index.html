<!DOCTYPE html>
<html>
<head>
    <title>Heart Chatbot</title>

    <style>
        /* 🌟 BODY - LIGHT GOLD */
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff4c2; /* light gold */
            overflow: hidden;
        }

        /* 💖 HEART BACKGROUND */
        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .hearts span {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 0, 100, 0.25);
            animation: float 8s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* 💬 CHATBOX - LIGHT GREEN */
        .chatbox {
            position: relative;
            z-index: 1;
            width: 420px;
            background: #d4f7dc; /* light green */
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 💚 USER QUESTION */
        .user {
            background: #b7f5c5;
            padding: 10px;
            margin: 5px;
            border-radius: 15px;
            text-align: right;
        }

        /* 🔵 BOT ANSWER */
        .bot {
            background: #b3e5ff;
            padding: 10px;
            margin: 5px;
            border-radius: 15px;
            text-align: left;
        }

        /* 💬 INPUT BOX */
        input {
            width: 70%;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        /* 💓 HEART WAVE BUTTON */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 50%;
            background: pink;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
            animation: wave 1.5s infinite;
        }

        button:hover {
            transform: scale(1.2);
            background: #ff4d94;
        }
        form {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

        @keyframes wave {
            0% { box-shadow: 0 0 0 0 rgba(255,105,180,0.5); }
            100% { box-shadow: 0 0 0 15px rgba(255,105,180,0); }
        }
    </style>
</head>

<body>

<!-- 💖 HEART BACKGROUND -->
<div class="hearts">
    <span style="left:10%">❤️</span>
    <span style="left:20%">💖</span>
    <span style="left:30%">❤️</span>
    <span style="left:40%">💖</span>
    <span style="left:50%">❤️</span>
    <span style="left:60%">💖</span>
    <span style="left:70%">❤️</span>
    <span style="left:80%">💖</span>
</div>

<div class="chatbox">

    {% if user %}
        <div class="user">You: {{ user }}</div>
    {% endif %}

    {% if result %}
        <div class="bot">Bot: {{ result }}</div>
    {% endif %}

    <form action="/chat" method="post">
        <input type="text" name="query" placeholder="Ask something..." required>
        <button type="submit">💖</button>
    </form>
    <script>
document.querySelector("form").addEventListener("submit", async function(e){
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/chat", {
        method: "POST",
        body: formData
    });

    let html = await res.text();

    document.body.innerHTML = html;
});
</script>
<span style="left:15%">❤️</span>
<span style="left:35%">💖</span>
<span style="left:55%">❤️</span>
<span style="left:75%">💖</span>
            


</div>

</body>
</html>
